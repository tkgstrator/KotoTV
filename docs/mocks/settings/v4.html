<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — v4 Card Grid</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background:          'hsl(var(--background))',
            foreground:          'hsl(var(--foreground))',
            card:                'hsl(var(--card))',
            'card-foreground':   'hsl(var(--card-foreground))',
            muted:               'hsl(var(--muted))',
            'muted-foreground':  'hsl(var(--muted-foreground))',
            border:              'hsl(var(--border))',
            primary:             'hsl(var(--primary))',
            'primary-foreground':'hsl(var(--primary-foreground))',
            ring:                'hsl(var(--ring))',
            destructive:         'hsl(var(--destructive))',
          },
        },
      },
    };
  </script>
  <style>
    :root {
      --background:         0 0% 96%;
      --foreground:         222 14% 18%;
      --card:               0 0% 100%;
      --card-foreground:    222 14% 18%;
      --muted:              210 10% 90%;
      --muted-foreground:   215 10% 45%;
      --border:             214 13% 84%;
      --primary:            221 83% 53%;
      --primary-foreground: 210 40% 98%;
      --ring:               221 83% 53%;
      --destructive:        0 72% 58%;
    }
    .dark {
      --background:         222 20% 10%;
      --foreground:         210 20% 92%;
      --card:               222 18% 14%;
      --card-foreground:    210 20% 92%;
      --muted:              222 16% 20%;
      --muted-foreground:   215 12% 55%;
      --border:             222 16% 22%;
      --primary:            221 83% 60%;
      --primary-foreground: 222 20% 10%;
      --ring:               221 83% 60%;
      --destructive:        0 72% 58%;
    }

    body {
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
      font-family: system-ui, -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif;
      margin: 0;
    }

    :focus-visible {
      outline: 2px solid hsl(var(--ring));
      outline-offset: 2px;
      border-radius: 4px;
    }

    /* ── Setting Card ── */
    .setting-card {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
      border-radius: 12px;
      padding: 18px 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Diagnostic card (read-only) ── */
    .diag-card {
      background: hsl(var(--muted) / 0.3);
      border: 1px dashed hsl(var(--border));
      border-radius: 12px;
      padding: 18px 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
    }

    /* Read-only stamp */
    .diag-card::before {
      content: '読み取り専用';
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 0.5625rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: hsl(var(--muted-foreground));
      background: hsl(var(--muted));
      border-radius: 3px;
      padding: 2px 6px;
    }

    .card-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card-icon-primary { background: hsl(var(--primary) / 0.15); }
    .card-icon-muted   { background: hsl(var(--muted)); }

    /* ── RadioGroup ── */
    .radio-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }
    .radio-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 6px;
      border-radius: 8px;
      border: 1.5px solid hsl(var(--border));
      cursor: pointer;
      font-size: 0.8125rem;
      transition: border-color 0.12s, background 0.12s;
    }
    .radio-tile:has(input:checked) {
      border-color: hsl(var(--primary));
      background: hsl(var(--primary) / 0.1);
      color: hsl(var(--primary));
      font-weight: 600;
    }
    .radio-tile:hover:not(:has(input:checked)) { background: hsl(var(--muted)); }
    .radio-tile input { position: absolute; opacity: 0; pointer-events: none; }

    /* ── Select ── */
    .select-native {
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      border: 1px solid hsl(var(--border));
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 0.875rem;
      cursor: pointer;
      width: 100%;
    }

    /* ── Progress ── */
    .progress { height: 5px; border-radius: 999px; background: hsl(var(--muted)); overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 999px; background: hsl(var(--primary)); }

    /* ── Grid layout ── */
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    @media (min-width: 900px) {
      .settings-grid { grid-template-columns: 1fr 1fr 1fr; }
    }

    @media (max-width: 580px) {
      .settings-grid { grid-template-columns: 1fr; }
    }

    /* health dots */
    .dot-up { background: hsl(142 70% 50%); }
    .dot-down { background: hsl(0 72% 58%); }
  </style>
</head>
<body>

<!-- Demo toolbar -->
<div style="position:sticky;top:0;z-index:50;background:hsl(var(--card));border-bottom:1px solid hsl(var(--border));padding:8px 16px;display:flex;justify-content:space-between;align-items:center;font-size:0.75rem;color:hsl(var(--muted-foreground))">
  <span>v4 — Card Grid (at-a-glance)</span>
  <button onclick="document.documentElement.classList.toggle('dark');this.textContent=document.documentElement.classList.contains('dark')?'Light mode':'Dark mode'"
    style="background:hsl(var(--muted));color:hsl(var(--muted-foreground));border:1px solid hsl(var(--border));border-radius:6px;padding:4px 10px;font-size:0.75rem;cursor:pointer;">
    Light mode
  </button>
</div>

<div style="max-width:1040px;margin:0 auto;padding:24px 16px 64px;">

  <h1 style="font-size:1.375rem;font-weight:700;margin:0 0 6px;">設定</h1>
  <p style="font-size:0.8125rem;color:hsl(var(--muted-foreground));margin:0 0 22px;">すべての設定を一覧できます。</p>

  <div class="settings-grid">

    <!-- ── Theme card ── -->
    <div class="setting-card">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="card-icon card-icon-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="hsl(var(--primary))" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        </div>
        <div>
          <div style="font-size:0.875rem;font-weight:600;">テーマ</div>
          <div style="font-size:0.75rem;color:hsl(var(--muted-foreground));">外観の切り替え</div>
        </div>
      </div>
      <div class="radio-grid">
        <label class="radio-tile">
          <input type="radio" name="theme" value="light" />
          <span style="font-size:1.25rem;">☀️</span>
          <span>ライト</span>
        </label>
        <label class="radio-tile">
          <input type="radio" name="theme" value="dark" checked />
          <span style="font-size:1.25rem;">🌙</span>
          <span>ダーク</span>
        </label>
        <label class="radio-tile">
          <input type="radio" name="theme" value="system" />
          <span style="font-size:1.25rem;">🖥️</span>
          <span>OS</span>
        </label>
      </div>
    </div>

    <!-- ── Quality card ── -->
    <div class="setting-card">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="card-icon card-icon-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="hsl(var(--primary))" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        </div>
        <div>
          <div style="font-size:0.875rem;font-weight:600;">ライブ画質</div>
          <div style="font-size:0.75rem;color:hsl(var(--muted-foreground));">デフォルトプリセット</div>
        </div>
      </div>
      <select class="select-native" aria-label="ライブ画質プリセット">
        <option value="auto">自動</option>
        <option value="high" selected>高画質 (~8 Mbps)</option>
        <option value="medium">中画質 (~4 Mbps)</option>
        <option value="low">低画質 (~1.5 Mbps)</option>
      </select>
    </div>

    <!-- ── HW accel card (read-only) ── -->
    <div class="diag-card">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="card-icon card-icon-muted">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="hsl(var(--muted-foreground))" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="2" x2="9" y2="4"/><line x1="15" y1="2" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="22"/><line x1="15" y1="20" x2="15" y2="22"/><line x1="2" y1="9" x2="4" y2="9"/><line x1="2" y1="15" x2="4" y2="15"/><line x1="20" y1="9" x2="22" y2="9"/><line x1="20" y1="15" x2="22" y2="15"/></svg>
        </div>
        <div>
          <div style="font-size:0.875rem;font-weight:600;color:hsl(var(--muted-foreground));">HW アクセラレーター</div>
          <div style="font-size:0.75rem;color:hsl(var(--muted-foreground));">FFmpeg エンコード方式</div>
        </div>
      </div>
      <div style="font-family:monospace;font-size:1.25rem;font-weight:800;color:hsl(var(--muted-foreground));letter-spacing:0.04em;text-align:center;background:hsl(var(--muted));border-radius:7px;padding:10px;">
        nvenc
      </div>
    </div>

    <!-- ── Storage card (read-only) ── -->
    <div class="diag-card">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="card-icon card-icon-muted">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="hsl(var(--muted-foreground))" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
        </div>
        <div>
          <div style="font-size:0.875rem;font-weight:600;color:hsl(var(--muted-foreground));">録画ストレージ</div>
          <div style="font-size:0.75rem;color:hsl(var(--muted-foreground));">/recordings</div>
        </div>
      </div>
      <div>
        <div class="progress" style="margin-bottom:6px;">
          <div class="progress-fill" style="width:28%"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:0.75rem;color:hsl(var(--muted-foreground));">
          <span>142 GB 使用中</span>
          <span>500 GB 中 28%</span>
        </div>
      </div>
    </div>

    <!-- ── Server health card (read-only) ── -->
    <div class="diag-card">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="card-icon card-icon-muted">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="hsl(var(--muted-foreground))" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        <div>
          <div style="font-size:0.875rem;font-weight:600;color:hsl(var(--muted-foreground));">サーバー状態</div>
          <div style="font-size:0.75rem;color:hsl(var(--muted-foreground));">GET /api/health</div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <div style="display:flex;align-items:center;justify-content:space-between;background:hsl(var(--muted));border-radius:6px;padding:8px 10px;">
          <span style="font-size:0.875rem;color:hsl(var(--muted-foreground));">mirakc</span>
          <span style="display:inline-flex;align-items:center;gap:5px;font-size:0.8125rem;font-weight:600;color:hsl(142 70% 50%);">
            <span style="width:7px;height:7px;border-radius:50%;display:inline-block;" class="dot-up"></span>
            稼働中
          </span>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;background:hsl(var(--muted));border-radius:6px;padding:8px 10px;">
          <span style="font-size:0.875rem;color:hsl(var(--muted-foreground));">Postgres</span>
          <span style="display:inline-flex;align-items:center;gap:5px;font-size:0.8125rem;font-weight:600;color:hsl(142 70% 50%);">
            <span style="width:7px;height:7px;border-radius:50%;display:inline-block;" class="dot-up"></span>
            稼働中
          </span>
        </div>
      </div>
    </div>

    <!-- ── About card ── -->
    <div class="setting-card" style="justify-content:space-between;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="card-icon card-icon-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="hsl(var(--primary))" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <div>
          <div style="font-size:0.875rem;font-weight:600;">About</div>
          <div style="font-size:0.75rem;color:hsl(var(--muted-foreground));">バージョン情報</div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-size:0.875rem;font-weight:700;">KonomiTV</div>
          <div style="font-size:0.75rem;color:hsl(var(--muted-foreground));">v0.1.0-alpha · MIT</div>
        </div>
        <span style="font-size:0.6875rem;font-weight:600;background:hsl(var(--primary) / 0.12);color:hsl(var(--primary));padding:3px 8px;border-radius:4px;border:1px solid hsl(var(--primary) / 0.3);">Phase 1</span>
      </div>
      <a href="#" tabindex="0" style="font-size:0.8125rem;color:hsl(var(--primary));display:inline-flex;align-items:center;gap:5px;text-decoration:none;margin-top:2px;">
        ソースコード (GitHub)
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>
    </div>

  </div><!-- /grid -->
</div>

<div style="position:fixed;bottom:12px;right:12px;font-size:0.6875rem;color:hsl(var(--muted-foreground));background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:6px;padding:4px 10px;pointer-events:none;">
  card grid / responsive
</div>

</body>
</html>
